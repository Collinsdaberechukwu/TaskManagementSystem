spring:
  application:
    name: TaskManagementSystem
server:
  port: 8080

  datasource:
    url: jdbc:h2:mem:taskManagementDb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create

  h2:
    console:
      enabled: true
      path: /h2-console

spring doc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
